<svg width="100%" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg">

<!-- outer card -->
<rect x="40" y="20" width="600" height="280" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="0.5"/>

<!-- top bar -->
<rect x="40" y="20" width="600" height="36" rx="10" fill="#161b22"/>
<rect x="40" y="44" width="600" height="12" fill="#161b22"/>

<!-- traffic lights -->
<circle cx="68" cy="38" r="6" fill="#f87171"/>
<circle cx="88" cy="38" r="6" fill="#f59e0b"/>
<circle cx="108" cy="38" r="6" fill="#22c55e"/>

<!-- title bar -->
<text x="340" y="43" text-anchor="middle" font-family="monospace" font-size="12" fill="#6e7681">speakops — terminal</text>

<!-- prompt -->
<text x="64" y="82" font-family="monospace" font-size="14" fill="#22c55e">❯</text>
<text x="78" y="82" font-family="monospace" font-size="14" fill="#e6edf3"> speakops listen</text>

<!-- line 1 -->
<text x="64" y="108" font-family="monospace" font-size="14">
  <tspan fill="#6e7681">[ mic ]</tspan>
  <tspan dx="8" fill="#e6edf3">Listening for voice input...</tspan>
</text>

<!-- line 2 -->
<text x="64" y="132" font-family="monospace" font-size="14">
  <tspan fill="#6e7681">[ stt ]</tspan>
  <tspan dx="8" fill="#e6edf3">Whisper transcribed — </tspan>
  <tspan fill="#60a5fa">"scale payment to 5"</tspan>
</text>

<!-- line 3 -->
<text x="64" y="156" font-family="monospace" font-size="14">
  <tspan fill="#6e7681">[ auth ]</tspan>
  <tspan dx="6" fill="#e6edf3">Voice match </tspan>
  <tspan fill="#22c55e">0.94</tspan>
  <tspan fill="#6e7681"> — authenticated</tspan>
</text>

<!-- line 4 -->
<text x="64" y="180" font-family="monospace" font-size="14">
  <tspan fill="#6e7681">[ intent ]</tspan>
  <tspan dx="4" fill="#e6edf3">scale </tspan>
  <tspan fill="#60a5fa">payment-service</tspan>
  <tspan fill="#e6edf3"> → replicas: </tspan>
  <tspan fill="#f59e0b">5</tspan>
</text>

<!-- line 5 -->
<text x="64" y="204" font-family="monospace" font-size="14">
  <tspan fill="#f59e0b">[ warn ]</tspan>
  <tspan dx="6" fill="#e6edf3">Production environment — confirm?</tspan>
</text>

<!-- line 6 -->
<text x="64" y="228" font-family="monospace" font-size="14">
  <tspan fill="#6e7681">[ you ]</tspan>
  <tspan dx="8" fill="#60a5fa">"confirm"</tspan>
</text>

<!-- line 7 -->
<text x="64" y="252" font-family="monospace" font-size="14">
  <tspan fill="#22c55e">[ done ]</tspan>
  <tspan dx="6" fill="#e6edf3">payment-service scaled to </tspan>
  <tspan fill="#22c55e">5 replicas ✓</tspan>
</text>

<!-- bottom divider -->
<line x1="40" y1="270" x2="640" y2="270" stroke="#30363d" stroke-width="0.5"/>

<!-- brand line -->
<text x="64" y="290" font-family="monospace" font-size="12">
  <tspan fill="#22c55e">SpeakOps</tspan>
  <tspan dx="6" fill="#6e7681">v0.1.0 — voice-driven devops orchestration</tspan>
</text>

</svg>
